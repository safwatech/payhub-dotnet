name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Stage shared test vectors at the path tests expect
        run: |
          # tests/Payhub.Tests/Payhub.Tests.csproj references
          # ..\..\..\shared	est-vectors\... — three levels up from
          # the test csproj. On the monorepo that's sdks/shared/...;
          # on the mirror it's parent-of-mirror/shared/. Stage the
          # vectors there.
          mkdir -p ../shared
          cp -R vendor/shared/test-vectors ../shared/
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build
      - run: dotnet pack -c Release --no-build -o ./nupkgs
      - name: Push package
        run: |
          dotnet nuget push ./nupkgs/Payhub.*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
      - name: Push symbols
        run: |
          dotnet nuget push ./nupkgs/Payhub.*.snupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
